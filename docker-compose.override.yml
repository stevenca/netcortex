# Development override: mount source so code changes take effect without rebuilding.
# docker compose automatically merges this file with docker-compose.yml.
# Remove or rename this file for a production deployment.
services:
  netcortex:
    volumes:
      - .:/app          # live source mount — overlays the image copy
    command:
      - uvicorn
      - netcortex.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --workers
      - "1"

  netcortex-worker:
    volumes:
      - .:/app          # live source mount — overlays the image copy

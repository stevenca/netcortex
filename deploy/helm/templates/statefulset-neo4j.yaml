{{- if .Values.neo4j.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "netcortex.fullname" . }}-neo4j
  labels:
    {{- include "netcortex.labels" . | nindent 4 }}
    app.kubernetes.io/component: neo4j
spec:
  serviceName: {{ include "netcortex.fullname" . }}-neo4j
  replicas: 1
  selector:
    matchLabels:
      {{- include "netcortex.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: neo4j
  template:
    metadata:
      labels:
        {{- include "netcortex.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: neo4j
    spec:
      # neo4j:5-community runs as UID/GID 7474. Same OpenShift note as redis —
      # grant anyuid SCC or use the official Neo4j Helm chart for OCP.
      securityContext:
        runAsUser: 7474
        runAsGroup: 7474
        fsGroup: 7474
      containers:
        - name: neo4j
          image: "{{ .Values.neo4j.image.repository }}:{{ .Values.neo4j.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: bolt
              containerPort: 7687
            - name: http
              containerPort: 7474
          env:
            - name: NEO4J_AUTH
              {{- if and .Values.neo4j.auth.enabled .Values.neo4j.auth.password }}
              value: "neo4j/{{ .Values.neo4j.auth.password }}"
              {{- else }}
              value: "none"
              {{- end }}
            # Allow apoc procedures used by the sync engine
            - name: NEO4J_dbms_security_procedures_unrestricted
              value: "apoc.*"
          resources:
            {{- toYaml .Values.neo4j.resources | nindent 12 }}
          volumeMounts:
            - name: neo4j-data
              mountPath: /data
            - name: neo4j-logs
              mountPath: /logs
          livenessProbe:
            tcpSocket:
              port: 7687
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: 7687
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
  volumeClaimTemplates:
    - metadata:
        name: neo4j-data
      spec:
        accessModes:
          - ReadWriteOnce
        {{- with .Values.neo4j.persistence.data.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.neo4j.persistence.data.size }}
    - metadata:
        name: neo4j-logs
      spec:
        accessModes:
          - ReadWriteOnce
        {{- with .Values.neo4j.persistence.logs.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.neo4j.persistence.logs.size }}
{{- end }}

{{- if not .Values.existingSecret -}}
# Chart-managed bootstrap secret.
# Prefer existingSecret (created out-of-band with kubectl --from-env-file)
# so that AWS keys never appear in Helm release history.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "netcortex.fullname" . }}-bootstrap
  labels:
    {{- include "netcortex.labels" . | nindent 4 }}
type: Opaque
stringData:
  SECRET_BACKEND: {{ .Values.secretBackend | quote }}
  AWS_REGION: {{ .Values.aws.region | quote }}
  NC_SECRET_PREFIX: {{ .Values.aws.secretPrefix | quote }}
  {{- if .Values.aws.accessKeyId }}
  AWS_ACCESS_KEY_ID: {{ .Values.aws.accessKeyId | quote }}
  {{- end }}
  {{- if .Values.aws.secretAccessKey }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.aws.secretAccessKey | quote }}
  {{- end }}
  {{- if .Values.aws.sessionToken }}
  AWS_SESSION_TOKEN: {{ .Values.aws.sessionToken | quote }}
  {{- end }}
  {{- if .Values.aws.endpointUrl }}
  AWS_SM_ENDPOINT_URL: {{ .Values.aws.endpointUrl | quote }}
  {{- end }}
{{- end }}
